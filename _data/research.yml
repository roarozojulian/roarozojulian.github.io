# _data/research.yml
# Papers grouped by `type` (peer-reviewed, book-chapter, working-paper).
# Set `featured: true` on exactly one paper — it will be rendered large in the
# dark band at the top of the page.
#
# Fields:
#   id          : unique slug, used as the modal anchor (matches data-modal=...)
#   type        : peer-reviewed | book-chapter | working-paper
#   featured    : true on exactly one entry
#   title       : paper title
#   image       : filename relative to /files/
#   alt         : image alt text
#   meta        : free-form meta line (venue, coauthors, year)
#   url         : link to the paper
#   description : the short blurb shown on the card
#   abstract    : longer text shown in the modal
#   keywords    : array of keyword pills (modal)
#   highlights  : array of bullet points (modal); leave empty to hide section

- id: paper-hysteresis-potential-output
  type: peer-reviewed
  featured: true
  title: "Is there hysteresis in potential output estimates?"
  image: "GraphEconomicsLetters.png"
  alt: "IMF's and OECD's real time output gap estimates"
  meta: "Economics Letters · 2024"
  url: "https://www.sciencedirect.com/science/article/abs/pii/S0165176523004925"
  description: >
    Using an error correction model, this paper studies the dynamics of GDP and
    potential GDP using OECD's Economic Outlook and IMF's World Economic Outlook
    estimates of the output gap. The findings suggest the presence of sizeable
    hysteresis effects, implying that short-run shocks to GDP have sizeable
    permanent effects on potential GDP.
  abstract: >
    Using an error correction model, this paper studies the dynamics of GDP and
    potential GDP using OECD's Economic Outlook and IMF's World Economic Outlook
    estimates of the output gap. The findings suggest the presence of hysteresis,
    implying that short-run shocks to GDP have sizeable permanent effects on
    potential GDP.
  keywords:
    - Hysteresis
    - Potential GDP
    - error correction model
    - Business cycle
    - Real time estimates
  highlights:
    - I found hysteresis effects on potential GDP estimates from IMF and OECD.
    - A 1-unit demand shock has a long-run effect on GDP of about 0.9 percentage points.
    - The hysteresis elasticity is around 0.28, which is sizeable.
    - These hysteresis effects are higher on OECD's than IMF's estimates.
    - The results can be interpreted as a failure of the natural rate hypothesis.

- id: paper-hysteresis-acce
  type: book-chapter
  title: "Hysterical but Convergent: The behavior of Colombia's Unemployment Rates"
  image: "LibroACCE.png"
  alt: "Unemployment rates in Colombia, 1984-2017"
  meta: "With Karen Lorena Pulido in Colombia. Algunos problemas de hoy visto por los jóvenes · 2021"
  url: "https://www.acceconomicas.org.co/product-page/colombia-algunos-problemas-de-hoy-visto-por-los-j%C3%B3venes"
  description: >
    The main objective of the paper is to study the behavior of the unemployment
    rates in Colombia, during the period between 1984 and 2017. First, we study
    if unemployment rates are hysterical by using unit root tests. Second, we ask
    whether changes in cities unemployment differences in Colombia are persistent
    over time and we found evidence of stochastic convergence. Third, we found
    stable long-term equilibrium differences in cities unemployment rates.
  abstract: >
    The main objective of the paper is to study the behavior of the unemployment
    rates in Colombia, during the period between 1984 and 2017. First, we study
    if unemployment rates are hysterical by using unit root tests. Main results
    show that unemployment rates are not stationary which rejects the natural
    rate of unemployment hypothesis. Second, we ask whether changes in cities
    unemployment differences in Colombia are persistent over time and we found
    evidence of stochastic convergence in cities unemployment differences.
    Third, we found stable long-term equilibrium differences in cities
    unemployment rates.
  keywords:
    - Unemployment rate
    - Hysteresis
    - Time series
    - Beta convergence
    - Unit root test
  highlights:
    - Unemployment rates in Colombia's seven major cities exhibit hysteresis.
    - Despite hysteresis, there is stochastic convergence among most cities' unemployment rates.
    - Cali, Manizales, Medellín, and Pasto show conditional (not absolute) convergence.
    - Cities take on average about two years to halve an unemployment shock differential.
    - The hysteresis finding challenges the use of a constant NAIRU for macroeconomic policy in Colombia.

- id: paper-trend-cycle-decomposition
  type: working-paper
  title: "A trend-cycle decomposition with hysteresis"
  image: "Figura3.jpg"
  alt: "Euro Area trend GDP under hysteresis"
  meta: "With Javier Gómez-Pineda · Borradores de Economía · 2023"
  url: "https://repositorio.banrep.gov.co/server/api/core/bitstreams/694b3c43-13c8-4964-bfb1-1722c096cebd/content"
  description: >
    A univariate trend-cycle decomposition with hysteresis that estimates the
    output gap and trend output for 81 economies (quarterly, since 1995) and
    184 economies (yearly, some going back to 1820).
  abstract: >
    The business cycle is the cycle in the output gap and also in a stationary
    measure of trend output. Both the output gap and trend output are driven by
    joint trend-cycle shocks. The model is a univariate trend-cycle decomposition
    with hysteresis in trend output that enables the estimation of the output gap
    and trend output in 81 economies in quarterly frequency, since 1995Q1; and
    184 economies in yearly frequency, in several cases since 1950, and in a few
    cases since 1820. Volatility and dispersion, as well as the frequency of
    large joint trend-cycle shocks, were low during the Gilded Age period; high
    during the interwar period, even more so in advanced (AD) economies compared
    to emerging market and developing economies (EMDE); and low in AD economies
    and high in EMDE economies in the post WWII period. In contrast with other
    existing estimates of trend output, those from the trend-cycle decomposition
    with hysteresis do not evolve smoothly, do not result in an artificial boom
    before recessions and are less sensitive to new data.
  keywords:
    - trend-cycle decomposition
    - hysteresis
    - output gap
    - trend output
    - business cycle
    - long-run data
  # highlights left empty intentionally — fill in when ready and the section
  # will appear automatically.
  highlights: []

- id: paper-monetary-spillovers
  type: working-paper
  title: "Spillovers of unconventional monetary policy from advanced economies to Latin America"
  image: "TesisUMP3.png"
  alt: "Monetary policy and shadow rates for advanced economies"
  meta: "Master thesis published as Documento CEDE · 2021"
  url: "https://repositorio.uniandes.edu.co/server/api/core/bitstreams/08e54136-a37d-490e-982d-baf0ef38b819/content"
  description: >
    I estimate the effects of unconventional monetary policies from the United
    States, Euro Area, United Kingdom, and Japan on Mexico, Brazil, Colombia,
    Chile, and Peru using a global projection model with shadow rates. Spillovers
    are small and the most relevant come from the United States. Counterfactual
    scenarios suggest Latin American economies would have had GDP losses close to
    0.5% and inflation 1.5% lower at the end of 2014 without these policies.
  abstract: >
    In this paper, I estimate the effects of unconventional monetary policies
    from the United States, Euro Area, United Kingdom, and Japan (advanced
    economies) on Mexico, Brazil, Colombia, Chile, and Peru using a global
    projection model with shadow rates. I find that spillovers are small and the
    most relevant come from the United States. I also find that volatility
    spillovers from advanced economies' unconventional monetary policies are
    negligible. Historical decomposition exercises show that the most affected
    variables by spillovers are the real exchange rate and inflation. Finally,
    I simulate counterfactual scenarios in which there were no unconventional
    monetary policies from advanced economies past 2008, and I find that Latin
    American economies would have had GDP losses close to 0.5% and inflation
    1.5% lower at the end of 2014. This shows the high costs of not implementing
    these policies — a result that is relevant to the COVID-19 crisis.
  keywords:
    - Unconventional Monetary Policy
    - spillovers
    - Latin America
    - shadow rates
    - Global projection model
    - Counterfactual
  highlights:
    - Spillovers from advanced economies' unconventional monetary policy to Latin America are small, and the most relevant ones come from the United States.
    - Volatility spillovers from advanced economies' UMP to Latin America are negligible.
    - In a counterfactual world without UMP after 2008, the US would have suffered GDP losses of around 8.1% and inflation 8.8 percentage points lower by 2014Q4, while Latin American economies would have had GDP losses of around 0.5% and inflation roughly 1.5 percentage points lower — showing the high cost of not implementing these policies.
    - I did not find structural changes associated with the ELB in the US, UK, and Euro Area, supporting the empirical irrelevance hypothesis of the effective lower bound.
    - Among shadow rate estimates, Wu & Xia (2016) shows the strongest correlation with UMP measures (QE balance sheets and Forward Guidance), making it the most suitable proxy for unconventional policy stance.
